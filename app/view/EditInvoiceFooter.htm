			var normalizeCodeValue = function(value){
				var normalized = $.trim(value || '');
				return (normalized.toUpperCase() === 'NULL') ? '' : normalized;
			};

			var prefillSelect2FromSearch = function(selector, value, endpoint){
				if (value === '') {
					return;
				}

				$.ajax({
					type: 'POST',
					url: endpoint,
					dataType: 'json',
					cache: false,
					data: {
						name: value
					},
					success: function(data){
						var selectedValue = value;
						var selectedLabel = value;

						$.each(data || [], function(_, item){
							var itemCode = $.trim((item.Code || '').toString());
							var itemName = $.trim((item.Name || '').toString());
							if (itemCode === value || itemName === value) {
								selectedValue = itemCode !== '' ? itemCode : value;
								selectedLabel = (itemCode !== '' && itemName !== '') ? (itemCode + ' - ' + itemName) : (itemName !== '' ? itemName : value);
								return false;
							}
						});

					$(selector).empty();
					$(selector).append($('<option/>').val(selectedValue).text(selectedLabel));
					$(selector).val(selectedValue).trigger('change');
					},
					error: function(){
						$(selector).empty();
						$(selector).append($('<option/>').val(value).text(value));
						$(selector).val(value).trigger('change');
					}
				});
			};

			invoicecurrency_2 = normalizeCodeValue(invoicecurrency_2);
